server:
  # Honour the platform-provided PORT (Render) first, then our own var.
  port: ${PORT:${SERVER_PORT:8083}}

spring:
  application:
    name: conddo-studio
  datasource:
    # Same Postgres as the platform, but this service owns the studio/jobs schemas.
    # Runs as an owner-capable role (no tenant RLS here — internal data).
    url: ${STUDIO_DB_URL:jdbc:postgresql://localhost:5432/conddo}
    username: ${STUDIO_DB_USER:conddo_owner}
    password: ${STUDIO_DB_PASSWORD:owner_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: studio
  flyway:
    enabled: true
    schemas: studio,jobs
    default-schema: studio
    create-schemas: true
    locations: classpath:db/migration

studio:
  # Internal staff JWT — HMAC (HS256), separate from the platform's RSA token.
  jwt:
    secret: ${STUDIO_JWT_SECRET:dev-studio-secret-change-me-at-least-32-bytes-0123456789}
    issuer: ${STUDIO_JWT_ISSUER:https://jobs.conddo.io}
    access-ttl: ${STUDIO_JWT_ACCESS_TTL:PT8H}      # staff working day
    refresh-ttl: ${STUDIO_JWT_REFRESH_TTL:P14D}
  sla:
    amber-hours: ${STUDIO_SLA_AMBER_HOURS:24}
    red-hours: ${STUDIO_SLA_RED_HOURS:6}
  cors:
    allowed-origins: ${STUDIO_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Shared secret the platform sends to create jobs (X-Studio-Service-Token on
  # /api/jobs/intake). Must match conddo-api's STUDIO_SERVICE_TOKEN. Blank = intake off.
  service:
    token: ${STUDIO_SERVICE_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health
