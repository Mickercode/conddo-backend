server:
  # Honour the platform-provided PORT (Render) first, then our own var.
  port: ${PORT:${SERVER_PORT:8083}}

spring:
  application:
    name: conddo-studio
  datasource:
    # Same Postgres as the platform, but this service owns the studio/jobs schemas.
    # Runs as an owner-capable role (no tenant RLS here — internal data).
    url: ${STUDIO_DB_URL:jdbc:postgresql://localhost:5432/conddo}
    username: ${STUDIO_DB_USER:conddo_owner}
    password: ${STUDIO_DB_PASSWORD:owner_password}
    hikari:
      # Every Studio query that touches a `public.*` table (tenants,
      # tenant_feature_flags, tenant_sites, …) is cross-tenant by nature.
      # Those tables have RLS policies that match either the per-tenant
      # `app.tenant_id` setting OR the `app.cross_tenant=true` carve-out.
      # The deploy expects Studio to land in the bypass branch — but
      # relying on `BYPASSRLS` being set on the connecting role makes
      # this work or fail invisibly per Postgres deploy. Setting the
      # session var on every pooled connection makes the carve-out
      # explicit and independent of role attributes. Costs one
      # parameter-setting round-trip per new connection (Hikari runs
      # this once at connection-create, not per query). Studio's own
      # tables in `studio.*` / `jobs.*` schemas don't have RLS, so the
      # var only matters when reading platform tables.
      connection-init-sql: "SET SESSION app.cross_tenant = 'true'"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: studio
  flyway:
    enabled: true
    schemas: studio,jobs
    default-schema: studio
    create-schemas: true
    locations: classpath:db/migration

  # Multipart limits — asset uploads (§9) cap at 10 MB; import bundles (§22)
  # can be much larger, so the multipart envelope defaults to the spec's
  # STUDIO_IMPORT_MAX_BYTES (256 MB). Per-asset upload size is enforced
  # separately inside AssetService against studio.assets.max-bytes.
  servlet:
    multipart:
      max-file-size: ${STUDIO_IMPORT_MAX_FILE_SIZE:256MB}
      max-request-size: ${STUDIO_IMPORT_MAX_REQUEST_SIZE:256MB}

studio:
  # Internal staff JWT — HMAC (HS256), separate from the platform's RSA token.
  jwt:
    secret: ${STUDIO_JWT_SECRET:dev-studio-secret-change-me-at-least-32-bytes-0123456789}
    issuer: ${STUDIO_JWT_ISSUER:https://jobs.conddo.io}
    access-ttl: ${STUDIO_JWT_ACCESS_TTL:PT8H}      # staff working day
    refresh-ttl: ${STUDIO_JWT_REFRESH_TTL:P14D}
  sla:
    amber-hours: ${STUDIO_SLA_AMBER_HOURS:24}
    red-hours: ${STUDIO_SLA_RED_HOURS:6}
    # SlaMonitorService cadence (§7). Default: first scan 60s after boot, then
    # every 5 min. Short enough to catch a breach within a tick, long enough not
    # to hammer the DB. Set ms negative or remove @EnableScheduling to disable.
    monitor-interval-ms: ${STUDIO_SLA_MONITOR_INTERVAL_MS:300000}
    monitor-initial-delay-ms: ${STUDIO_SLA_MONITOR_INITIAL_DELAY_MS:60000}
  # Browser origins for the Studio frontend.
  #   allowed-origins         — exact origins (STUDIO_CORS_ALLOWED_ORIGINS), comma-separated.
  #   allowed-origin-patterns — wildcards (STUDIO_CORS_ALLOWED_ORIGIN_PATTERNS), e.g.
  #                             "https://*.vercel.app" for Vercel preview deploys.
  # Note the Studio frontend uses port 3001 locally; conddo-app uses 3000 — list both for local dev.
  cors:
    allowed-origins: ${STUDIO_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000}
    allowed-origin-patterns: ${STUDIO_CORS_ALLOWED_ORIGIN_PATTERNS:}
  # Shared secret the platform sends to create jobs (X-Studio-Service-Token on
  # /api/jobs/intake). Must match conddo-api's STUDIO_SERVICE_TOKEN. Blank = intake off.
  service:
    token: ${STUDIO_SERVICE_TOKEN:}
  # Platform Admin (§23 Phase 13b). Studio calls conddo-api's existing public
  # /auth/forgot-password to issue user password resets from the Studio
  # console — avoids duplicating the token-issuing + email-templating logic.
  # Blank → POST /admin/platform/users/{id}/reset-password returns
  # 502 PLATFORM_API_UNAVAILABLE.
  platform:
    api-base-url: ${STUDIO_PLATFORM_API_BASE_URL:}
  # AI assistant (§8) — Claude (Anthropic). Blank api-key → the assistant is dormant
  # (endpoints return available:false, never an error). Model is the current Sonnet
  # (the spec's claude-sonnet-4-20250514 is deprecated); set CLAUDE_MODEL to override
  # (e.g. claude-opus-4-7 for max quality).
  ai:
    claude:
      api-key: ${CLAUDE_API_KEY:}
      model: ${CLAUDE_MODEL:claude-sonnet-4-6}
  # Asset storage (§9) — Cloudinary. Reuses the platform's CLOUDINARY_URL by default
  # (Cloudinary public_ids are prefixed studio/jobs/... so they don't collide with
  # the platform's tenant media). Blank → asset uploads return 502.
  cloudinary:
    url: ${CLOUDINARY_URL:}
  # Server-side defensive cap on asset size; multipart limit above is the front line.
  assets:
    max-bytes: ${STUDIO_ASSETS_MAX_BYTES:10485760}   # 10 MB
  # First-admin bootstrap — see StudioAdminBootstrap. Only used on an empty
  # studio.staff table; safe to leave set across restarts. Clear after first login
  # and rotate the password from the Staff page.
  bootstrap:
    admin:
      email: ${STUDIO_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${STUDIO_BOOTSTRAP_ADMIN_PASSWORD:}
      name: ${STUDIO_BOOTSTRAP_ADMIN_NAME:Studio Admin}
  # High-priority email mirror (§13.4 — Brevo). The Studio mirrors three
  # in-app notifications to email so staff don't miss them: JobReassigned,
  # JobRevisionRequested, JobEscalated (to TEAM_LEAD + ADMIN). Anything else
  # is SSE-only to avoid noise.
  #   provider=brevo    → BrevoStudioMailer becomes @Primary
  #   anything else / unset → LoggingStudioMailer logs the message instead.
  # api-key / from must both be set for emails to actually go out; otherwise
  # the Brevo adapter logs once at startup and drops sends (lifecycle never breaks).
  notifications:
    email:
      provider: ${STUDIO_EMAIL_PROVIDER:}
      api-key: ${STUDIO_EMAIL_API_KEY:}
      from: ${STUDIO_EMAIL_FROM:}
      from-name: ${STUDIO_EMAIL_FROM_NAME:Conddo Studio}
      base-url: ${STUDIO_EMAIL_BASE_URL:https://api.brevo.com}

management:
  endpoints:
    web:
      exposure:
        include: health
