server:
  # Honour the platform-provided PORT (Render) first.
  port: ${PORT:${SERVER_PORT:8084}}

spring:
  application:
    name: conddo-payments
  datasource:
    # Same Postgres as the platform — payments service owns the payments schema.
    # Runs as conddo_owner (no RLS here — service-side checks gate by tenant_id).
    url: ${PAYMENTS_DB_URL:jdbc:postgresql://localhost:5432/conddo}
    username: ${PAYMENTS_DB_USER:conddo_owner}
    password: ${PAYMENTS_DB_PASSWORD:owner_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: payments
  flyway:
    enabled: true
    schemas: payments
    default-schema: payments
    create-schemas: true
    locations: classpath:db/migration

payments:
  # Service-to-service token. Same value lives on conddo-api as
  # PAYMENTS_SERVICE_TOKEN — the platform sends it on /internal/* calls.
  # Blank = internal endpoints all 401.
  service:
    token: ${PAYMENTS_SERVICE_TOKEN:}

  # The conddo-api callback URL. After processing a RoutePay webhook,
  # we POST to {api-base-url}/api/v1/internal/payments/notify so the
  # tenant's order/booking gets flipped to PAID and an in-app notification fires.
  # Blank = webhook still processes but the callback is skipped.
  api:
    base-url: ${CONDDO_API_BASE_URL:}

  # Tenant JWT verification — same RSA public key as conddo-api so a tenant
  # Bearer issued by conddo-api works here without re-login. Local default:
  # the dev key on classpath (matches conddo-api). In prod set CONDDO_JWT_PUBLIC_KEY
  # to point at the same file conddo-api uses.
  jwt:
    public-key: ${CONDDO_JWT_PUBLIC_KEY:classpath:keys/dev_public.pem}
    issuer: ${CONDDO_JWT_ISSUER:https://conddo.io}

  # Browser CORS — the tenant-facing FE calls this service directly via
  # NEXT_PUBLIC_PAYMENTS_API_URL. Patterns enable Vercel preview URLs +
  # tenant subdomains; mirrors conddo-api's CORS shape.
  cors:
    allowed-origins: ${PAYMENTS_CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-origin-patterns: ${PAYMENTS_CORS_ALLOWED_ORIGIN_PATTERNS:}

routepay:
  # Test env per the spec: auth-test.routepay.com + payment-test.routepay.com.
  # When neither set is configured, the dormant adapter returns deterministic
  # stubs so the rest of the service can run + tests work without a network.
  auth-base-url: ${ROUTEPAY_AUTH_BASE_URL:https://auth-test.routepay.com}
  base-url: ${ROUTEPAY_BASE_URL:https://payment-test.routepay.com}
  client-id: ${ROUTEPAY_CLIENT_ID:}
  client-secret: ${ROUTEPAY_CLIENT_SECRET:}
  webhook-secret: ${ROUTEPAY_WEBHOOK_SECRET:}
  # Conddo's revenue cut from each successful payment, in basis points
  # (e.g. 250 = 2.50%). RoutePay's split-payment feature applies this to
  # platform-account on top of the per-transaction fee they take.
  platform-fee-bps: ${ROUTEPAY_PLATFORM_FEE_BPS:250}

management:
  endpoints:
    web:
      exposure:
        include: health
